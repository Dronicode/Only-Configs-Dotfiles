StylesPath = styles
Vocab = dictionaries
MinAlertLevel = suggestion
Packages = proselint, write-good

[*.md]
BasedOnStyles = Vale, proselint, write-good, Custom
Vale.Spelling = NO
BlockIgnores = (?ms)(^<%\\?\*\s*$.*?^_?%>\s*$)
TokenIgnores = (<%\\?[-=#*]?[^%\n]*%>)

# Vale Templater ignore notes:
# - BlockIgnores are for multiline regions that should be removed from analysis
#   as one whole block. Use them for script-style Templater sections like:
#
#     <%*     or     <%\*
#     let title = tp.file.title;
#     ...
#     %>      or     _%>
#
# - TokenIgnores are for single inline tokens that appear inside otherwise normal
#   prose or frontmatter, such as <%= title %> or <%# comment %>.
#
# Current block regex: (?ms)(^<%\\?\*\s*$.*?^_?%>\s*$)
# - (?m) enables line-anchored ^ and $ matching for each line
# - (?s) makes . span newlines so the whole block can be matched
# - ^<%\\?\*\s*$ matches a line that contains <%* or <%\* by allowing an
#   optional backslash before the * modifier
# - .*? lazily consumes everything inside the block
# - ^_?%>\s*$ matches a line that ends with either %> or _%>
#
# Current token regex: (<%\\?[-=#*]?[^%\n]*%>)
# - <% starts any templater tag
# - \\? optionally matches a backslash after <% for escaped Templater syntax
# - [-=#*]? optionally matches templater modifiers like *, =, or #
# - [^%\n]* consumes the tag contents without crossing a newline or closing %
# - %> matches the tag end
#
# Vocabulary notes:
# - Vocabularies must live under StylesPath/config/vocabularies/<Name>/
# - Vale expects plain-text accept.txt and reject.txt files there